# Strategie-Parameter fuer die Backtest-Engine (Phase 2+).
# Wird von StrategyLoader gelesen. Strategie-Klassen werden ueber die Registry
# in quant_trader.strategies registriert (Self-Registration im __init__.py).
#
# Konvention:
#   <strategy_name>:
#     params:
#       <key>: <value>

sma_cross:
  params:
    fast: 20
    slow: 50

momentum:
  params:
    lookback_months: 12
    skip_recent_months: 1
    top_n: 10
    rebalance_freq: monthly

rsi_mean_reversion:
  params:
    period: 14
    oversold: 30.0
    overbought: 70.0

etf_rotation:
  params:
    universe:
      - SPY
      - AGG
      - TLT
      - IEF
    top_n: 2
    lookback_months: 6
    rebalance_freq: monthly
